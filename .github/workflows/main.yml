name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          ls -la
          find . -maxdepth 4 -type f | sort

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip python3-setuptools python3-venv \
            build-essential ccache libffi-dev libssl-dev \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake libltdl-dev

      - name: Install Buildozer
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user buildozer cython virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Find Buildozer project
        id: find_project
        run: |
          SPEC_FILE=$(find . -name buildozer.spec | head -n 1)

          if [ -z "$SPEC_FILE" ]; then
            echo "ERROR: No buildozer.spec file found."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SPEC_FILE")
          echo "Found buildozer.spec at: $SPEC_FILE"
          echo "Project directory: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Accept Android SDK licenses and build APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sudoku-android-apk
          path: ${{ steps.find_project.outputs.project_dir }}/bin/*.apk